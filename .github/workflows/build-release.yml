name: Build & Release

# 打一个 v* 开头的 tag（如 v1.1）即自动构建并发布到 Releases。
# 也可在 Actions 页手动触发（workflow_dispatch）做一次测试构建。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.1），手动触发时用'
        required: true
        default: '0.0-test'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install PySide6 pyinstaller

      - name: 解析版本号
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v',''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "building version $v"

      - name: PyInstaller 打包
        run: pyinstaller --noconfirm --windowed --onedir --name "DesktopMemo" --add-data "index.html;." app.py

      - name: 安装 Inno Setup
        run: choco install innosetup --no-progress -y

      - name: 准备简体中文语言文件
        shell: pwsh
        run: |
          $dst = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          if (-not (Test-Path $dst)) {
            Invoke-WebRequest -UseBasicParsing -TimeoutSec 60 `
              -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" `
              -OutFile $dst
          }

      - name: 编译安装程序
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer.iss'

      - name: 上传构建产物（手动触发时可在 Actions 下载）
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: installer_out/*.exe

      - name: 发布到 Releases（仅 tag 触发）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_out/*.exe
          generate_release_notes: true
